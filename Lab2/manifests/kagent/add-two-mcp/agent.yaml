# Agent using MCPServer mcp-add-two (apply after mcpserver.yaml)
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: add-numbers-agent
  namespace: kagent
spec:
  description: Agent that adds two numbers via MCP tool add_two_numbers.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are a helpful assistant. You have tool add_two_numbers(a, b) — sum of two integers.
      When the user asks to add, sum, or combine two numbers, call this tool with the right a and b.
      If numbers are unclear, ask. Reply in Markdown and briefly explain the result.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          name: mcp-add-two
          kind: MCPServer
          toolNames:
            - add_two_numbers
