# MCPServer + Agent in one file (same as mcpserver.yaml + agent.yaml)
# Requires local image add-two-mcp:latest (see README.md in this directory)
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-add-two
  namespace: kagent
spec:
  deployment:
    image: add-two-mcp:latest
    # Without this, :latest uses pull policy Always → Docker Hub pull and ImagePullBackOff.
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/server.py
  stdioTransport: {}
  transportType: stdio
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: add-numbers-agent
  namespace: kagent
spec:
  description: Agent that adds two numbers via MCP tool add_two_numbers.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are a helpful assistant. You have tool add_two_numbers(a, b) — sum of two integers.
      When the user asks to add, sum, or combine two numbers, call this tool with the right a and b.
      If numbers are unclear, ask. Reply in Markdown and briefly explain the result.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          name: mcp-add-two
          kind: MCPServer
          toolNames:
            - add_two_numbers
