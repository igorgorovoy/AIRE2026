# MCPServer + Agent у одному файлі (еквівалент mcpserver.yaml + agent.yaml)
# Потрібен локальний образ add-two-mcp:latest (див. README.md у цьому каталозі)
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-add-two
  namespace: kagent
spec:
  deployment:
    image: add-two-mcp:latest
    port: 3000
    cmd: python
    args:
      - /app/server.py
  stdioTransport: {}
  transportType: stdio
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: add-numbers-agent
  namespace: kagent
spec:
  description: Агент, який складає два числа через MCP-інструмент add_two_numbers.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      Ти допоміжний асистент. У тебе є інструмент add_two_numbers(a, b) — сума двох цілих чисел.
      Коли користувач просить додати, скласти або підсумувати два числа, викликай цей інструмент з відповідними a та b.
      Якщо числа не вказані чітко — уточни. Відповідай у Markdown і коротко поясни результат.
    tools:
      - type: McpServer
        mcpServer:
          name: mcp-add-two
          kind: MCPServer
          toolNames:
            - add_two_numbers
