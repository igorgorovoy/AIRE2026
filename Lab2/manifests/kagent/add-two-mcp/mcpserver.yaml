# MCP server with add_two_numbers tool (image built from docs/examples/add-two-mcp/)
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-add-two
  namespace: kagent
spec:
  deployment:
    image: add-two-mcp:latest
    # Without this, :latest uses pull policy Always → Docker Hub pull and ImagePullBackOff.
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/server.py
  stdioTransport: {}
  transportType: stdio
