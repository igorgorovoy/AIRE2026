# Lab1 beginners: agentgateway з Google Gemini (AI Studio)
# Схема: https://agentgateway.dev/docs/standalone/latest/tutorials/llm-gateway/
# API ключ: https://aistudio.google.com/api-keys
# yaml-language-server: $schema=https://agentgateway.dev/schema/config
binds:
  - port: 3000
    listeners:
      - routes:
          - backends:
              - ai:
                  name: gemini
                  provider:
                    gemini:
                      model: gemini-2.5-flash
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: ["*"]
              backendAuth:
                key: "$GEMINI_API_KEY"
