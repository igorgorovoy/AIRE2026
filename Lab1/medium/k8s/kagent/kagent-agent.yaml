# kagent Agent v1alpha2: Kubernetes-агент через agentgateway → Gemini
# Схема: kubectl get crd agents.kagent.dev -o yaml
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-agentgateway-agent
  namespace: kagent
  labels:
    lab: AIRE2026
spec:
  type: Declarative
  description: "Kubernetes-агент AIRE2026: відповідає на питання про кластер через agentgateway → Gemini 2.5 Flash"
  declarative:
    modelConfig: agentgateway-gemini
    systemMessage: |
      Ти — досвідчений DevOps-асистент, що спеціалізується на Kubernetes.
      Ти маєш доступ до інструментів для роботи з кластером (kubectl, helm).
      Відповідай чітко і коротко. Використовуй українську мову.
      Завжди пояснюй, які команди ти виконуєш і чому.
    tools: []
