# kagent ModelConfig v1alpha2: agentgateway як OpenAI-сумісний LLM провайдер
# Схема: kubectl get crd modelconfigs.kagent.dev -o yaml
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: agentgateway-gemini
  namespace: kagent
  labels:
    lab: AIRE2026
spec:
  model: gemini-2.5-flash
  provider: OpenAI
  apiKeySecret: gemini-secret
  apiKeySecretKey: Authorization
  openAI:
    baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/v1"
