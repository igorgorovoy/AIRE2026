# kagent: ModelConfig — підключення до agentgateway як LLM провайдер
# Документація: https://kagent.dev/docs/kagent/getting-started/quickstart
# kagent використовує OpenAI-сумісний API, тому agentgateway виступає проксі
---
apiVersion: kagent.dev/v1alpha1
kind: ModelConfig
metadata:
  name: agentgateway-gemini
  namespace: kagent
  labels:
    lab: AIRE2026
spec:
  # Тип провайдера — OpenAI-compatible (agentgateway надає OpenAI-сумісний API)
  provider: openai
  # URL agentgateway proxy всередині кластера
  baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1"
  # Модель, яку обирає agentgateway на стороні Gemini
  model: gemini-2.5-flash
  # Секрет не потрібен — agentgateway сам додає ключ до бекенду
  # Але kagent очікує поле apiKeySecretRef для OpenAI-compatible
  apiKeySecretRef:
    name: gemini-secret
    namespace: kagent
    key: Authorization
