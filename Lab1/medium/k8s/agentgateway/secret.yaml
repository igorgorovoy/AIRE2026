# LLM provider API keys (example single Secret — run.sh uses per-provider secrets instead)
# IMPORTANT: do not commit real keys — use sealed-secrets or an external secrets manager
# Apply: kubectl apply -f secret.yaml (after substituting values)
# Or use run.sh (creates gemini-secret / anthropic-secret / openai-secret from env)
apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: agentgateway-system
  labels:
    app: agentgateway
    lab: AIRE2026
type: Opaque
stringData:
  GEMINI_API_KEY: "${GEMINI_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
