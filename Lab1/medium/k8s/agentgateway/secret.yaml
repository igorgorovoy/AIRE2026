# Секрети для API ключів LLM провайдерів
# ВАЖЛИВО: не комітити з реальними ключами — використовуйте sealed-secrets або зовнішній secrets manager
# Заповнення: kubectl apply -f secret.yaml
# Або через run.sh (підставляє змінні середовища автоматично)
apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: agentgateway-system
  labels:
    app: agentgateway
    lab: AIRE2026
type: Opaque
stringData:
  GEMINI_API_KEY: "${GEMINI_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
