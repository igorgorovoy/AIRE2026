# Example Secret for production MCP server configuration.
# Do NOT commit real credentials — use sealed-secrets or external-secrets.
#
# Apply:
#   kubectl apply -f secrets-example.yaml -n kagent
#
# For lab/demo, env map in mcpserver-*.yaml (STORAGE_BACKEND=local) may be enough.
# This file is needed for STORAGE_BACKEND=lakefs or real KB_API_BASE_URL/API_KEY.
---
# Secret for lesson-credits (lakeFS backend)
# Format: single key "dot-env" = .env file content read via TASKS_ENV_FILE
apiVersion: v1
kind: Secret
metadata:
  name: mcp-lesson-credits-secrets
  namespace: kagent
type: Opaque
stringData:
  # Key "dot-env" becomes file: /secrets/mcp-lesson-credits-secrets/dot-env
  # Server reads via: TASKS_ENV_FILE=/secrets/mcp-lesson-credits-secrets/dot-env
  dot-env: |
    STORAGE_BACKEND=lakefs
    LAKEFS_ENDPOINT=http://lakefs.svc.cluster.local:8000
    LAKEFS_ACCESS_KEY=your-access-key
    LAKEFS_SECRET_KEY=your-secret-key
    LAKEFS_REPO=lesson-credits
    LAKEFS_BRANCH=main
---
# Secret for tasks (lakeFS backend)
apiVersion: v1
kind: Secret
metadata:
  name: mcp-tasks-secrets
  namespace: kagent
type: Opaque
stringData:
  dot-env: |
    STORAGE_BACKEND=lakefs
    LAKEFS_ENDPOINT=http://lakefs.svc.cluster.local:8000
    LAKEFS_ACCESS_KEY=your-access-key
    LAKEFS_SECRET_KEY=your-secret-key
    LAKEFS_REPO=tasks
    LAKEFS_BRANCH=main
    ENABLE_DELETE_TOOLS=0
---
# Secret for knowledge-base (API key for backend)
apiVersion: v1
kind: Secret
metadata:
  name: mcp-knowledge-base-secrets
  namespace: kagent
type: Opaque
stringData:
  dot-env: |
    KB_API_BASE_URL=http://kb-backend.default.svc.cluster.local:8000
    API_KEY=your-real-api-key
