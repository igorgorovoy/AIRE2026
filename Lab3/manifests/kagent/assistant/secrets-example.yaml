# Приклад Secret для production-конфігурації MCP серверів.
# НЕ комітити з реальними credentials — використовуй sealed-secrets або external-secrets.
#
# Застосувати:
#   kubectl apply -f secrets-example.yaml -n kagent
#
# Для lab/demo достатньо лише env map у mcpserver-*.yaml (STORAGE_BACKEND=local).
# Цей файл потрібен лише якщо STORAGE_BACKEND=lakefs або KB_API_BASE_URL/API_KEY — реальні.
---
# Secret для lesson-credits (lakeFS backend)
# Формат: один ключ "dot-env" = вміст .env файлу, який читається через TASKS_ENV_FILE
apiVersion: v1
kind: Secret
metadata:
  name: mcp-lesson-credits-secrets
  namespace: kagent
type: Opaque
stringData:
  # Ключ "dot-env" буде файлом: /secrets/mcp-lesson-credits-secrets/dot-env
  # Сервер читає його через: TASKS_ENV_FILE=/secrets/mcp-lesson-credits-secrets/dot-env
  dot-env: |
    STORAGE_BACKEND=lakefs
    LAKEFS_ENDPOINT=http://lakefs.svc.cluster.local:8000
    LAKEFS_ACCESS_KEY=your-access-key
    LAKEFS_SECRET_KEY=your-secret-key
    LAKEFS_REPO=lesson-credits
    LAKEFS_BRANCH=main
---
# Secret для tasks (lakeFS backend)
apiVersion: v1
kind: Secret
metadata:
  name: mcp-tasks-secrets
  namespace: kagent
type: Opaque
stringData:
  dot-env: |
    STORAGE_BACKEND=lakefs
    LAKEFS_ENDPOINT=http://lakefs.svc.cluster.local:8000
    LAKEFS_ACCESS_KEY=your-access-key
    LAKEFS_SECRET_KEY=your-secret-key
    LAKEFS_REPO=tasks
    LAKEFS_BRANCH=main
    ENABLE_DELETE_TOOLS=0
---
# Secret для knowledge-base (API key до backend)
apiVersion: v1
kind: Secret
metadata:
  name: mcp-knowledge-base-secrets
  namespace: kagent
type: Opaque
stringData:
  dot-env: |
    KB_API_BASE_URL=http://kb-backend.default.svc.cluster.local:8000
    API_KEY=your-real-api-key
