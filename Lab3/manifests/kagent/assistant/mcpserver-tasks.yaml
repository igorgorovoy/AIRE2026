# MCP server Task Manager — workspaces, boards, lists, cards, comments, attachments.
# Image built from agentic-ai-landing-zone root
#   (uses agents/, core/, scripts/ as local modules).
# Dockerfile: Lab3/mcp-servers/src/tasks/Dockerfile
#
# STORAGE CONFIGURATION:
#   Credentials from Secret mcp-tasks-secrets (see secrets.yaml).
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-tasks
  namespace: kagent
spec:
  deployment:
    image: mcp-tasks:latest
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/mcp-servers-tasks/server.py
    env:
      ENABLE_DELETE_TOOLS: "0"
    secretRefs:
      - name: mcp-tasks-secrets
  stdioTransport: {}
  transportType: stdio
