# 3 MCPServer + 1 Agent in one file (equivalent to applying all 4 YAMLs).
# Requires local images (see README.md in this directory):
#   mcp-knowledge-base:latest
#   mcp-lesson-credits:latest
#   mcp-tasks:latest
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-knowledge-base
  namespace: kagent
spec:
  deployment:
    image: mcp-knowledge-base:latest
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/server.py
    env:
      - name: KB_API_BASE_URL
        value: "http://kb-backend.default.svc.cluster.local:8000"
      - name: API_KEY
        value: ""
  stdioTransport: {}
  transportType: stdio
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-lesson-credits
  namespace: kagent
spec:
  deployment:
    image: mcp-lesson-credits:latest
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/mcp-servers-lesson-credits/server.py
    env:
      - name: STORAGE_BACKEND
        value: "local"
  stdioTransport: {}
  transportType: stdio
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-tasks
  namespace: kagent
spec:
  deployment:
    image: mcp-tasks:latest
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/mcp-servers-tasks/server.py
    env:
      - name: STORAGE_BACKEND
        value: "local"
      - name: ENABLE_DELETE_TOOLS
        value: "0"
  stdioTransport: {}
  transportType: stdio
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: assistant-agent
  namespace: kagent
spec:
  description: >
    Personal AI assistant with access to knowledge base (Obsidian vault),
    lesson credits, and task manager (workspaces/boards/cards).
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are a personal AI assistant with access to three systems:

      1. **Knowledge Base** (Obsidian vault graph, backend on port 8000).
         Tools: kb_graph_get, kb_get_document, kb_list_documents,
         kb_graph_rebuild, kb_edit_document.

      2. **Lesson Credits** (English. Mary lesson tracking).
         Tools: lessons_list_calendars, lessons_get_balance,
         lessons_top_up, lessons_deduct, lessons_delete_transaction.

      3. **Task Manager** (workspaces, boards, lists, cards, comments).
         Tools: tasks_list_workspaces, tasks_create_workspace,
         tasks_update_workspace, tasks_list_boards, tasks_create_board,
         tasks_update_board, tasks_move_board, tasks_list_lists,
         tasks_create_list, tasks_update_list, tasks_move_list,
         tasks_list_cards, tasks_create_card, tasks_update_card,
         tasks_get_card, tasks_move_card, tasks_delete_card,
         tasks_list_comments, tasks_add_comment, tasks_list_attachments,
         tasks_add_attachment, tasks_sync_beads, tasks_get_board.

      Operating rules:
      - Before any write operation, confirm details with the user.
      - Read current state (balance, list, board) first, then propose actions.
      - Reply in structured Markdown. If something is unclear, ask.
      - For lesson credits, always show the current balance after an operation.
      - For the task manager, always confirm resource IDs before moves.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          name: mcp-knowledge-base
          kind: MCPServer
          toolNames:
            - kb_graph_get
            - kb_get_document
            - kb_list_documents
            - kb_graph_rebuild
            - kb_edit_document
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          name: mcp-lesson-credits
          kind: MCPServer
          toolNames:
            - lessons_list_calendars
            - lessons_get_balance
            - lessons_top_up
            - lessons_deduct
            - lessons_delete_transaction
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          name: mcp-tasks
          kind: MCPServer
          toolNames:
            - tasks_list_workspaces
            - tasks_create_workspace
            - tasks_update_workspace
            - tasks_list_boards
            - tasks_create_board
            - tasks_update_board
            - tasks_move_board
            - tasks_list_lists
            - tasks_create_list
            - tasks_update_list
            - tasks_move_list
            - tasks_list_cards
            - tasks_create_card
            - tasks_update_card
            - tasks_get_card
            - tasks_move_card
            - tasks_delete_card
            - tasks_list_comments
            - tasks_add_comment
            - tasks_list_attachments
            - tasks_add_attachment
            - tasks_sync_beads
            - tasks_get_board
