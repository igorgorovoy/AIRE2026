# MCP server Knowledge Base — Obsidian vault graph via HTTP backend.
# Image build context: Lab3/mcp-servers/src/knowledge-base/
# Requires a running KB backend (KB_API_BASE_URL).
#
# CONFIGURATION:
#   Credentials from Secret mcp-knowledge-base-secrets (see secrets.yaml).
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-knowledge-base
  namespace: kagent
spec:
  deployment:
    image: mcp-knowledge-base:latest
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/server.py
    secretRefs:
      - name: mcp-knowledge-base-secrets
  stdioTransport: {}
  transportType: stdio
