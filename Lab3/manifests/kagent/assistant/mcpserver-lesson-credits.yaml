# MCP server Lesson Credits — lesson accounting (top-up, deduct, balance).
# Image built from agentic-ai-landing-zone root
#   (uses agents/, core/ as local packages).
# Dockerfile: Lab3/mcp-servers/src/lesson-credits/Dockerfile
#
# STORAGE CONFIGURATION:
#   Credentials from Secret mcp-lesson-credits-secrets (see secrets.yaml).
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-lesson-credits
  namespace: kagent
spec:
  deployment:
    image: mcp-lesson-credits:latest
    imagePullPolicy: IfNotPresent
    port: 3000
    cmd: python
    args:
      - /app/mcp-servers-lesson-credits/server.py
    env:
      ENABLE_DELETE_TOOLS: "0"
    secretRefs:
      - name: mcp-lesson-credits-secrets
  stdioTransport: {}
  transportType: stdio
