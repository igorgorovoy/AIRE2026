# A2A Orchestrator Agent — Kubernetes deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-orchestrator-agent
  namespace: a2a
  labels:
    app: a2a-orchestrator-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-orchestrator-agent
  template:
    metadata:
      labels:
        app: a2a-orchestrator-agent
    spec:
      containers:
        - name: orchestrator-agent
          image: a2a-orchestrator-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 14001
              protocol: TCP
          env:
            - name: A2A_ORCHESTRATOR_PORT
              value: "14001"
            - name: A2A_PUBLIC_BASE_URL
              value: "http://a2a-orchestrator-agent.a2a.svc.cluster.local:14001"
            - name: A2A_ASSISTANT_URL
              value: "http://a2a-assistant-agent.a2a.svc.cluster.local:14000"
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 14001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 14001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: a2a-orchestrator-agent
  namespace: a2a
  labels:
    app: a2a-orchestrator-agent
spec:
  selector:
    app: a2a-orchestrator-agent
  ports:
    - port: 14001
      targetPort: 14001
      protocol: TCP
  type: ClusterIP
