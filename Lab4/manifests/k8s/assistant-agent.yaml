# A2A Personal Assistant Agent — Kubernetes deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-assistant-agent
  namespace: a2a
  labels:
    app: a2a-assistant-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-assistant-agent
  template:
    metadata:
      labels:
        app: a2a-assistant-agent
    spec:
      containers:
        - name: assistant-agent
          image: a2a-assistant-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: KB_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: a2a-assistant-secrets
                  key: KB_API_BASE_URL
                  optional: true
            - name: KB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-assistant-secrets
                  key: KB_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: a2a-assistant-agent
  namespace: a2a
  labels:
    app: a2a-assistant-agent
spec:
  selector:
    app: a2a-assistant-agent
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
  type: ClusterIP
