# Example secrets for A2A agents.
# Copy to secrets.yaml and fill in real values.
#
# KB_API_BASE_URL — must be reachable FROM INSIDE the cluster (pods), not only from your Mac.
# - If KB runs on the host (uvicorn on :8000): do NOT use http://127.0.0.1:8000 or
#   http://localhost:8000 — that is the pod's own loopback, not the host.
# - Prefer: deploy KB as a Deployment+Service in Kubernetes and use cluster DNS
#   (below), OR use a host alias that pods can resolve:
#   - Try http://host.docker.internal:8000 (often works with Rancher Desktop / Docker VM)
#   - Try http://host.k3s.internal:8000 (k3s host gateway, when available)
#   - Or your Mac's LAN IP if the VM can route to it (e.g. 192.168.x.x:8000)
# Verify from a pod: kubectl run -n a2a curl --rm -it --restart=Never --image=curlimages/curl -- \
#   curl -sS -o /dev/null -w "%{http_code}" "http://<your-base-url>/api/kb-graph/mtimes"
---
apiVersion: v1
kind: Secret
metadata:
  name: a2a-assistant-secrets
  namespace: a2a
type: Opaque
stringData:
  # In-cluster KB Service (change namespace/name/port to match your deploy):
  KB_API_BASE_URL: "http://kb-backend.default.svc.cluster.local:8000"
  # Host-only KB (uncomment one, comment the line above after testing from a pod):
  # KB_API_BASE_URL: "http://host.docker.internal:8000"
  # KB_API_BASE_URL: "http://host.k3s.internal:8000"
  KB_API_KEY: ""
