apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: observability
  labels:
    app.kubernetes.io/name: phoenix
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: phoenix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phoenix
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          ports:
            - name: http
              containerPort: 6006
            - name: grpc
              containerPort: 4317
          env:
            - name: PHOENIX_WORKING_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: phoenix-data
